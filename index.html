<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>墨影格斗 · Ink Duel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>墨影格斗 · Ink Duel</h1>
      <p>黑白水墨风 · 快节奏对决 · 参考暗影格斗手感</p>
    </header>

    <section class="menu" id="menu">
      <div class="pickers">
        <label>你的角色
          <select id="playerPick"></select>
        </label>
        <label>对手角色
          <select id="enemyPick"></select>
        </label>
      </div>
      <div class="controls">
        <div><b>移动：</b>A / D</div>
        <div><b>跳跃：</b>W</div>
        <div><b>防御：</b>S（按住）</div>
        <div><b>轻击：</b>J</div>
        <div><b>重击：</b>K</div>
        <div><b>冲刺：</b>L</div>
      </div>
      <button id="startBtn">开始对战</button>
    </section>

    <section class="hud" id="hud">
      <div class="hp-wrap">
        <div class="name" id="pName"></div>
        <div class="hp-bg"><div class="hp" id="pHp"></div></div>
      </div>
      <div class="center-msg" id="roundMsg">ROUND 1</div>
      <div class="hp-wrap enemy">
        <div class="name" id="eName"></div>
        <div class="hp-bg"><div class="hp" id="eHp"></div></div>
      </div>
    </section>

    <canvas id="game" width="1280" height="720" aria-label="fighting game"></canvas>

    <section class="tips">
      <span>连段建议：J → J → K</span>
      <span>防御可减伤 70%</span>
      <span>重击有硬直，注意时机</span>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
